<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" font-family="Consolas,monospace" width="920" height="520" font-size="14px">
  <style>
    .key    { fill: #d29922; }
    .val    { fill: #79c0ff; }
    .dim    { fill: #30363d; }
    .green  { fill: #3fb950; }
    .cyan   { fill: #39d2c0; }
    .text   { fill: #c9d1d9; }
    .title  { fill: #e6edf3; font-weight: bold; }
    .cmt    { fill: #6e7681; }
    .red    { fill: #f85149; }
    .purp   { fill: #bc8cff; }
  </style>

  <rect width="920" height="520" fill="#0d1117" rx="12"/>

  <!-- Left panel -->
  <rect x="20" y="20" width="340" height="480" fill="none" stroke="#30363d" stroke-width="1" rx="6"/>
  <rect x="20" y="20" width="340" height="26" fill="#161b22" rx="6"/>
  <rect x="20" y="32" width="340" height="14" fill="#161b22"/>
  <circle cx="32" cy="33" r="5" fill="#f85149"/>
  <circle cx="48" cy="33" r="5" fill="#d29922"/>
  <circle cx="64" cy="33" r="5" fill="#3fb950"/>

  <!-- Text avatar -->
  <rect x="42" y="68" width="296" height="390" fill="#0d1117" stroke="#30363d" stroke-width="1" rx="10"/>
  <text x="64" y="98" class="green" font-size="13px" font-weight="bold">roman@developer</text>
  <text x="64" y="120" class="dim" font-size="12px">/home/roman/profile</text>

  <circle cx="190" cy="206" r="78" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="190" cy="206" r="62" fill="#39d2c0"/>
  <text x="190" y="225" fill="#0d1117" font-size="54px" font-weight="bold" text-anchor="middle">RP</text>
  <text x="190" y="304" class="cmt" font-size="12px" text-anchor="middle">FULL-STACK / QA / IOT</text>

  <line x1="64" y1="332" x2="316" y2="332" stroke="#30363d" stroke-width="1"/>
  <text x="64" y="358" class="key" font-size="12px">BUILD</text>
  <text x="154" y="358" class="green" font-size="12px">STABLE</text>
  <text x="64" y="382" class="key" font-size="12px">UPTIME</text>
  <text x="154" y="382" class="text" font-size="12px">7+ YEARS</text>
  <text x="64" y="406" class="key" font-size="12px">STACK</text>
  <text x="154" y="406" class="text" font-size="12px">MERN + IoT</text>
  <text x="64" y="430" class="key" font-size="12px">STATUS</text>
  <text x="154" y="430" class="text" font-size="12px">shipping</text>

  <text x="35" y="490" class="dim" font-size="11px">v2.0.0 · est. 2026</text>

  <!-- Separator -->
  <line x1="375" y1="30" x2="375" y2="490" stroke="#21262d" stroke-width="1"/>

  <!-- Right panel -->
  <text x="390" y="55" class="text" font-size="15px">
    <tspan x="390" dy=" 0" font-weight="bold" class="title">roman@github</tspan><tspan class="dim">:~$ </tspan><tspan class="green">cat /etc/profile</tspan>
  </text>
  <text x="390" y="75" class="dim">──────────────────────────────────────────────────────────</text>

  <text x="390" y="100" class="text">
    <tspan x="390" dy=" 0" class="green">></tspan> Full-Stack Developer | QA Automation | IoT Maker
  </text>
  <text x="390" y="125" class="text">
    <tspan x="390" dy=" 0" class="dim">></tspan> Building reliable, self-hosted, developer-friendly products.
  </text>

  <text x="390" y="155" class="title">$ cat /etc/about</text>
  <text x="390" y="175" class="dim">──────────────────────────────────</text>

  <text x="390" y="200" class="key">Full-Stack</text>
  <text x="520" y="200" class="val">MERN + TypeScript + Node.js</text>
  <text x="390" y="220" class="key">Embedded/IoT</text>
  <text x="520" y="220" class="val">ESP32, Wi-Fi/BLE, Home Assistant</text>
  <text x="390" y="240" class="key">Automation</text>
  <text x="520" y="240" class="val">QA mindset, self-hosting, CI/CD</text>
  <text x="390" y="260" class="key">Currently</text>
  <text x="520" y="260" class="val">Server patterns &amp; containers</text>
  <text x="390" y="280" class="key">Seeking</text>
  <text x="520" y="280" class="val">IoT, automation, full-stack collabs</text>

  <text x="390" y="315" class="title">$ ls /usr/local/stack</text>
  <text x="390" y="335" class="dim">──────────────────────────────────</text>

  <text x="390" y="360" class="key">Languages</text>
  <text x="520" y="360" class="val">TypeScript, JavaScript, Python</text>
  <text x="390" y="380" class="key">Frontend</text>
  <text x="520" y="380" class="val">React, Next.js, Tailwind</text>
  <text x="390" y="400" class="key">Backend</text>
  <text x="520" y="400" class="val">Node.js, Express, REST APIs</text>
  <text x="390" y="420" class="key">Database</text>
  <text x="520" y="420" class="val">MongoDB, PostgreSQL, Redis</text>
  <text x="390" y="440" class="key">DevOps</text>
  <text x="520" y="440" class="val">Docker, Linux, Nginx, Cloudflare</text>
  <text x="390" y="460" class="key">Hardware</text>
  <text x="520" y="460" class="val">ESP32, Raspberry Pi, BLE</text>

  <rect x="390" y="478" width="510" height="1" fill="#21262d"/>

  <text x="390" y="500" font-size="11px">
    <tspan class="cmt">$ nc </tspan><tspan class="val">contact@thisroman.dev</tspan>
    <tspan class="dim">  │  </tspan>
    <tspan class="cmt">$ curl -s </tspan><tspan class="val">linkedin.com/in/roman-pinchuk</tspan>
  </text>
</svg>
